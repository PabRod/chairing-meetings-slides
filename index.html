		var forgetPop = true;
		function onPopState(event) {
			if(forgetPop){
				forgetPop = false;
			} else {
				parent.postMessage(event.target.location.href, "app://obsidian.md");
			}
        }
		window.onpopstate = onPopState;
		window.onmessage = event => {
			if(event.data == "reload"){
				window.document.location.reload();
			}
			forgetPop = true;
		}

		function fitElements(){
			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}


		document.onreadystatechange = () => {
			fitElements();
			if (document.readyState === 'complete') {
				if (window.location.href.indexOf("?export") != -1){
					parent.postMessage(event.target.location.href, "app://obsidian.md");
				}
				if (window.location.href.indexOf("print-pdf") != -1){
					let stateCheck = setInterval(() => {
						clearInterval(stateCheck);
						window.print();
					}, 250);
				}
			}
	};

## Nobody likes meetings

- &shy;<!-- .element: class="fragment" data-fragment-index="1" -->They interrupt deep work
- &shy;<!-- .element: class="fragment" data-fragment-index="2" -->They overrun their schedule
- &shy;<!-- .element: class="fragment" data-fragment-index="3" -->Half the room wonders why they're there
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Yet we can't stop having them

- &shy;<!-- .element: class="fragment" data-fragment-index="1" -->Decisions need to be taken
- &shy;<!-- .element: class="fragment" data-fragment-index="2" -->Some problems need real-time input
- &shy;<!-- .element: class="fragment" data-fragment-index="3" -->Face to face time builds trust
</div>

<aside class="notes"><p>Some things genuinely require everyone in the same (virtual) room:</p>
<!-- .slide: data-background-image="https://github.com/PabRod/autodiff-slides/blob/main/_meta/_img/escience.png?raw=true" --></aside></script></section></section><section ><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## The most effective meeting...

...is the one that doesn't take place.
</div>

<aside class="notes"><p>The best outcome is often avoiding the meeting altogether.</p>
<!-- .slide: data-background-image="https://github.com/PabRod/autodiff-slides/blob/main/_meta/_img/escience.png?raw=true" --></aside></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" data-background-image="https://github.com/PabRod/autodiff-slides/blob/main/_meta/_img/escience.png?raw=true" -->

## The 0th rule

Before booking, ask yourself:

- &shy;<!-- .element: class="fragment" data-fragment-index="1" -->How is this meeting better than an email?
- &shy;<!-- .element: class="fragment" data-fragment-index="2" -->Be a silent hero!
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Politely declining meetings

- &shy;<!-- .element: class="fragment" data-fragment-index="1" -->Can save you time...
- &shy;<!-- .element: class="fragment" data-fragment-index="2" -->... but also others.
- &shy;<!-- .element: class="fragment" data-fragment-index="3" -->It is the most **ethical and professional** thing to do
</div>

<aside class="notes"><p>Suggest a short formula: &quot;I don&#39;t think I can contribute much here. Could you loop me in on the outcome?&quot;</p>
<!-- .slide: data-background-image="https://github.com/PabRod/autodiff-slides/blob/main/_meta/_img/escience.png?raw=true" --></aside></script></section></section><section ><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->

# Before the meeting
</div>

<aside class="notes"><p>but from now on, let&#39;s assume we want to proceed with the meeting</p>
<!-- .slide: data-background-image="https://github.com/PabRod/autodiff-slides/blob/main/_meta/_img/escience.png?raw=true" --></aside></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" data-background-image="https://github.com/PabRod/autodiff-slides/blob/main/_meta/_img/escience.png?raw=true" -->

## The agenda

- &shy;<!-- .element: class="fragment" data-fragment-index="1" -->**Why** are we meeting?
- &shy;<!-- .element: class="fragment" data-fragment-index="2" -->**What** needs to be decided or discussed?
- &shy;<!-- .element: class="fragment" data-fragment-index="3" -->**Who** needs to be there?
- &shy;<!-- .element: class="fragment" data-fragment-index="4" -->**Where and when** does it happen?
- &shy;<!-- .element: class="fragment" data-fragment-index="5" -->No agenda = huge warning signal.
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Estimating duration

- &shy;<!-- .element: class="fragment" data-fragment-index="1" -->Estimate generously. Better safe than sorry. 
- &shy;<!-- .element: class="fragment" data-fragment-index="2" -->Nobody minds a meeting that ends too early.
- &shy;<!-- .element: class="fragment" data-fragment-index="3" -->Don't concatenate meetings back-to-back.
</div>

<aside class="notes"><p>Help the audience develop an intuition for the true cost of meetings.</p>
<!-- .slide: data-background-image="https://github.com/PabRod/autodiff-slides/blob/main/_meta/_img/escience.png?raw=true" --></aside></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Background materials

> *This is not a library. It's a meeting.*

- &shy;<!-- .element: class="fragment" data-fragment-index="1" -->Send the materials in advance...
- &shy;<!-- .element: class="fragment" data-fragment-index="2" -->... and I don't mean 5 minutes in advance.
- &shy;<!-- .element: class="fragment" data-fragment-index="3" -->The meeting is for **discussion**, not for **reading**.
</div>

<aside class="notes"><p>Materials sent in advance let people arrive prepared, so the meeting can focus on dialogue rather than information transfer.</p>
<!-- .slide: data-background-image="https://github.com/PabRod/autodiff-slides/blob/main/_meta/_img/escience.png?raw=true" --></aside></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" data-background-image="https://github.com/PabRod/autodiff-slides/blob/main/_meta/_img/escience.png?raw=true" -->

## Sticking to the point

- &shy;<!-- .element: class="fragment" data-fragment-index="1" -->Meetings naturally become brainstorming sessions.
- &shy;<!-- .element: class="fragment" data-fragment-index="2" -->Particularly in academy.
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Moderating interventions

The chair's responsibilities:

- &shy;<!-- .element: class="fragment" data-fragment-index="1" -->Keep discussion on track
- &shy;<!-- .element: class="fragment" data-fragment-index="2" -->Give everyone a fair chance to speak
- &shy;<!-- .element: class="fragment" data-fragment-index="3" -->Cut tangents. Politely but firmly
- &shy;<!-- .element: class="fragment" data-fragment-index="4" -->Tip: use a timer
</div>

<aside class="notes"><p>Even informal meetings benefit from someone in the chair role.</p>
<!-- .slide: data-background-image="https://github.com/PabRod/autodiff-slides/blob/main/_meta/_img/escience.png?raw=true" --></aside></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Being on time

- &shy;<!-- .element: class="fragment" data-fragment-index="1" -->Starting late punishes the punctual.
- &shy;<!-- .element: class="fragment" data-fragment-index="2" -->Ending late punishes everyone.
</div>

<aside class="notes"><p>and makes you look like someone who doesn&#39;t know how to use a clock</p>
<!-- .slide: data-background-image="https://github.com/PabRod/autodiff-slides/blob/main/_meta/_img/escience.png?raw=true" --></aside></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" data-background-image="https://github.com/PabRod/autodiff-slides/blob/main/_meta/_img/escience.png?raw=true" -->

## Ending with action points

A meeting without action points is just a conversation. Every action needs:
- A clear **task**
- An **owner**
- A **deadline**
</div></script></section></section><section ><section data-markdown><script type="text/template"><!-- .slide: class="drop" data-background-image="https://github.com/PabRod/autodiff-slides/blob/main/_meta/_img/escience.png?raw=true" -->

# After the meeting
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->

## Keeping it actionable

- Send a brief summary with action points
- Use a shared tracker
</div>

<aside class="notes"><p>The meeting isn&#39;t over when people leave the room. It&#39;s over when the actions are done.</p>
<!-- .slide: data-background-image="https://github.com/PabRod/autodiff-slides/blob/main/_meta/_img/escience.png?raw=true" --></aside></script></section></section><section ><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->

## A special case: updates

- &shy;<!-- .element: class="fragment" data-fragment-index="1" -->🙂 No agenda is needed
- &shy;<!-- .element: class="fragment" data-fragment-index="2" -->🙁 They tend to derail
</div>

<aside class="notes"><p>Update meetings (standups, progress reviews) are a common genre. They deserve their own treatment.</p>
<!-- .slide: data-background-image="https://github.com/PabRod/autodiff-slides/blob/main/_meta/_img/escience.png?raw=true" --></aside></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" data-background-image="https://github.com/PabRod/autodiff-slides/blob/main/_meta/_img/escience.png?raw=true" -->

## Tips for update meetings

- Time each update (e.g. 30 seconds per person)
- No problem-solving during updates. Schedule them separately
</div></script></section></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" data-background-image="https://github.com/PabRod/autodiff-slides/blob/main/_meta/_img/escience.png?raw=true" -->

      function extend() {
        var target = {};
        for (var i = 0; i < arguments.length; i++) {
          var source = arguments[i];
          for (var key in source) {
            if (source.hasOwnProperty(key)) {
              target[key] = source[key];
            }
          }
        }
        return target;
      }

	  function isLight(color) {
		let hex = color.replace('#', '');

		// convert #fff => #ffffff
		if(hex.length == 3){
			hex = `${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`;
		}

		const c_r = parseInt(hex.substr(0, 2), 16);
		const c_g = parseInt(hex.substr(2, 2), 16);
		const c_b = parseInt(hex.substr(4, 2), 16);
		const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
		return brightness > 155;
	}

	var bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();
	var isLight = isLight(bgColor);

	if(isLight){
		document.body.classList.add('has-light-background');
	} else {
